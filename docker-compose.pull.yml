version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: sinan-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sinan
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  sinan-server:
    image: programercat/sina_server:latest
    container_name: sinan-server
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Data__Provider: MySql
      ConnectionStrings__SiNan: "Server=mysql;Port=3306;Database=sinan;User=root;Password=root;"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  sinan-console:
    image: programercat/sina_console:latest
    container_name: sinan-console
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      SiNanServer__BaseUrl: "http://sinan-server:8080"
      ConnectionStrings__ConsoleDb: "Data Source=/data/console-auth.db"
      Auth__BootstrapAdmin__UserName: "admin"
      Auth__BootstrapAdmin__Password: "admin123"
    ports:
      - "5110:8080"
    volumes:
      - console_data:/data
    depends_on:
      sinan-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  console_data:
